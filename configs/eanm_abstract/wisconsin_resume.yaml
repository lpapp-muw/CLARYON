experiment:
  name: eanm_wisconsin
  seed: 42
  results_dir: Results/eanm_abstract/wisconsin
  complexity: medium

data:
  tabular:
    path: datasets/wisconsin-breast-cancer/train.csv
    label_col: label
    sep: ";"

preprocessing:
  zscore: true
  feature_selection: true
  spearman_threshold: 0.8

cv:
  strategy: kfold
  n_folds: 5
  seeds: [42, 123, 456]

models:
  - name: qdc_hadamard
    type: tabular_quantum
  - name: qdc_swap
    type: tabular_quantum
  - name: quantum_gp
    type: tabular_quantum
  - name: qnn
    type: tabular_quantum
  - name: qcnn_muw
    type: tabular_quantum
  - name: qcnn_alt
    type: tabular_quantum
  - name: ensemble
    type: tabular

evaluation:
  metrics: [bacc, auc, sensitivity, specificity]
  statistical_tests: [friedman]
  confidence_level: 0.95

reporting:
  markdown: true
  latex: true
  figures: true
