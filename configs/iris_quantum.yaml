experiment:
  name: iris_quantum
  seed: 42
  results_dir: Results/iris_quantum
data:
  tabular:
    path: datasets/iris/iris_binary.csv
    label_col: label
    id_col: Key
    sep: ";"
cv:
  strategy: holdout
  test_size: 0.25
  seeds: [42]
models:
  - name: projected_kernel_svm
    type: tabular_quantum
  - name: kernel_svm
    type: tabular_quantum
    params:
      n_qubits: 2
  - name: qcnn_muw
    type: tabular_quantum
    params:
      n_qubits: 2
      epochs: 10
      lr: 0.02
  - name: qcnn_alt
    type: tabular_quantum
    params:
      n_qubits: 2
      epochs: 10
      lr: 0.02
evaluation:
  metrics: [bacc, auc, sensitivity, specificity]
reporting:
  markdown: true
