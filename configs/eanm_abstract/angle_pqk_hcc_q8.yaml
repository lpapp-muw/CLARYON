experiment:
  name: angle_pqk_hcc_q8
  seed: 42
  results_dir: Results/eanm_abstract/angle_pqk_benchmark/hcc_q8
  complexity: medium

data:
  tabular:
    path: datasets/hcc-survival/train.csv
    label_col: label
    sep: ";"

preprocessing:
  zscore: true
  feature_selection: true
  spearman_threshold: 0.8
  max_features: 8

cv:
  strategy: kfold
  n_folds: 5
  seeds: [42, 123, 456]

models:
  - name: xgboost
    type: tabular
  - name: lightgbm
    type: tabular
  - name: catboost
    type: tabular
  - name: mlp
    type: tabular
  - name: angle_pqk_svm
    type: tabular

evaluation:
  metrics: [bacc, auc, sensitivity, specificity]
  statistical_tests: [friedman]

reporting:
  markdown: true
  latex: true
  figures: true
