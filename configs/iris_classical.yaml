experiment:
  name: iris_classical
  seed: 42
  results_dir: Results/iris_classical
  complexity: quick

data:
  tabular:
    path: datasets/iris/iris.csv
    label_col: label
    sep: ";"

preprocessing:
  zscore: true
  feature_selection: true
  spearman_threshold: 0.8

cv:
  strategy: kfold
  n_folds: 3
  seeds: [42]

models:
  - name: xgboost
    type: tabular
  - name: lightgbm
    type: tabular
  - name: catboost
    type: tabular
  - name: mlp
    type: tabular

evaluation:
  metrics: [bacc, auc, sensitivity, specificity]

reporting:
  markdown: true
  latex: false
