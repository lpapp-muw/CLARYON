experiment:
  name: iris_full_preprocess
  seed: 42
  results_dir: Results/iris_preprocess

data:
  tabular:
    path: datasets/iris/iris.csv
    label_col: label
    id_col: Key
    sep: ";"

binary_grouping:
  enabled: true
  positive: [1, 2]    # versicolor + virginica
  negative: [0]        # setosa

preprocessing:
  zscore: true
  feature_selection: true
  spearman_threshold: 0.8
  image_normalization: per_image

cv:
  strategy: kfold
  n_folds: 5
  seeds: [42]

models:
  - name: xgboost
    type: tabular
  - name: kernel_svm
    type: tabular_quantum
  - name: qcnn_muw
    type: tabular_quantum
    params:
      epochs: 10

explainability:
  shap: true
  lime: true

evaluation:
  metrics: [bacc, auc, sensitivity, specificity]

reporting:
  markdown: true
  latex: true
