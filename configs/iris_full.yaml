experiment:
  name: iris_full_pipeline
  seed: 42
  results_dir: Results/iris_full

data:
  tabular:
    path: demo_data/iris/iris_binary.csv
    label_col: label
    id_col: Key
    sep: ";"

cv:
  strategy: kfold
  n_folds: 5
  seeds: [42, 123]

models:
  - name: xgboost
    type: tabular
    params:
      n_estimators: 200
  - name: lightgbm
    type: tabular
  - name: catboost
    type: tabular
    params:
      iterations: 200
      verbose: 0
  - name: mlp
    type: tabular
    params:
      hidden_layer_sizes: [64, 32]
      max_iter: 500
  - name: kernel_svm
    type: tabular_quantum
  - name: qcnn_muw
    type: tabular_quantum
    params:
      epochs: 15
      lr: 0.02
  - name: qcnn_alt
    type: tabular_quantum
    params:
      epochs: 15
      lr: 0.02

explainability:
  shap: true
  lime: true
  max_features: 4
  max_test_samples: 10

evaluation:
  metrics: [bacc, auc, sensitivity, specificity]
  statistical_tests: [friedman]

reporting:
  latex: true
  markdown: true
  figures: true
  figure_dpi: 300
