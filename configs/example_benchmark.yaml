experiment:
  name: benchmark_quick
  seed: 42
  results_dir: Results/benchmark

data:
  tabular:
    path: benchmark_preprocessed/iris/FDB.csv
    label_col: Label
    sep: ";"

cv:
  strategy: kfold
  n_folds: 5
  seeds: [42, 123, 456]

models:
  - name: xgboost
    type: tabular
  - name: lightgbm
    type: tabular
  - name: catboost
    type: tabular
  - name: mlp
    type: tabular
  - name: kernel_svm
    type: tabular_quantum
    params:
      n_qubits: 4

evaluation:
  metrics: [bacc, auc, sensitivity, specificity, logloss]
  statistical_tests: [friedman]

reporting:
  markdown: true
  latex: true
  figures: true
