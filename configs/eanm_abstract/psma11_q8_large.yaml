experiment:
  name: eanm_psma11_q8_large
  seed: 42
  results_dir: Results/eanm_abstract/psma11_q8_large
  complexity: medium

data:
  tabular:
    path: datasets/psma11/train.csv
    label_col: label
    sep: ";"

preprocessing:
  zscore: true
  feature_selection: true
  spearman_threshold: 0.8
  max_features: 8

cv:
  strategy: kfold
  n_folds: 5
  seeds: [42, 123, 456]

models:
  - name: xgboost
    type: tabular
  - name: lightgbm
    type: tabular
  - name: catboost
    type: tabular
  - name: mlp
    type: tabular
  - name: kernel_svm
    type: tabular_quantum
  - name: qdc_hadamard
    type: tabular_quantum
  - name: quantum_gp
    type: tabular_quantum
  - name: qnn
    type: tabular_quantum
    params:
      num_layers: 6
      epochs: 300
      lr: 0.003
      margin: 0.1
  - name: qcnn_muw
    type: tabular_quantum
    preset: large
  - name: qcnn_alt
    type: tabular_quantum
    preset: large
  - name: ensemble
    type: tabular

evaluation:
  metrics: [bacc, auc, sensitivity, specificity]
  statistical_tests: [friedman]

reporting:
  markdown: true
  latex: true
  figures: true
