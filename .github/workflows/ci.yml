name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lint is intentionally not a CI gate in v0.13.0. The codebase has known
# ruff-flagged stylistic issues (mostly imports/line-length) inherited from
# multiple feature additions. Lint cleanup is a separate task; functional
# correctness is gated by the test matrix below.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,boosting,quantum,imaging,explain,report]"
      - name: Run tests
        run: |
          python -m pytest tests/ -x -q --timeout=300 \
            --ignore=tests/test_integration
        timeout-minutes: 15
      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration/ -x -q --timeout=600
        timeout-minutes: 30
